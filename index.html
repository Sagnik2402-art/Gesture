<!DOCTYPE html>
<html>
<head>
    <title>3D Gesture Spawner</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        
        /* The video feed sits at the bottom */
        #webcam {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror view */
            z-index: 1; 
        }

        /* The 3D layer sits on top of the video */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none; /* Let clicks pass through */
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 3;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 15px;
            border-radius: 10px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h3 id="status">Loading AI...</h3>
        <p>✋ <b>Open Palm:</b> Spheres</p>
        <p>✊ <b>Closed Fist:</b> Cubes</p>
        <p>✌️ <b>Victory:</b> Pyramids</p>
    </div>

    <video id="webcam" autoplay playsinline></video>

    <!-- Load Three.js and MediaPipe via CDNs -->
    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        import { GestureRecognizer, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById("webcam");
        const status = document.getElementById("status");
        
        let gestureRecognizer;
        let lastVideoTime = -1;
        let lastSpawnTime = 0;
        const spawnCooldown = 800; // ms between spawns

        // --- 1. Three.js Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        // Alpha: true makes the background transparent so we see the video
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(light);
        const pointLight = new THREE.PointLight(0xffffff, 10);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        camera.position.z = 5;

        // --- 2. Initialize AI & Camera ---
        async function init() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 1
                });
                
                status.innerText = "Camera Ready!";
                startCamera();
            } catch (err) {
                status.innerText = "Error: Use a Local Server (https/localhost)";
                console.error(err);
            }
        }

        async function startCamera() {
            const constraints = { video: { width: 1280, height: 720 } };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            video.addEventListener("loadeddata", () => {
                renderLoop();
            });
        }

        // --- 3. Spawning Logic ---
        function spawnObject(gesture, x, y) {
            // Map 0-1 coords to Three.js 3D space
            // MediaPipe X is 0 (left) to 1 (right)
            // Three.js X is -5 (left) to 5 (right)
            const worldX = (x - 0.5) * 10; 
            const worldY = (0.5 - y) * 8; 

            let geometry;
            let material = new THREE.MeshStandardMaterial({ 
                color: new THREE.Color(`hsl(${Math.random() * 360}, 70%, 60%)`),
                metalness: 0.5,
                roughness: 0.1
            });

            if (gesture === "Open_Palm") {
                geometry = new THREE.SphereGeometry(0.3, 32, 32);
            } else if (gesture === "Closed_Fist") {
                geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            } else if (gesture === "Victory") {
                geometry = new THREE.ConeGeometry(0.4, 0.8, 4);
            } else return;

            const mesh = new THREE.Mesh(geometry, material);
            // We flip worldX because the video is mirrored
            mesh.position.set(-worldX, worldY, 0); 
            scene.add(mesh);
            
            mesh.userData.rotSpeed = Math.random() * 0.03 + 0.01;
        }

        // --- 4. Main Render Loop ---
        function renderLoop() {
            // AI Detection
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = gestureRecognizer.recognizeForVideo(video, Date.now());

                if (results.gestures.length > 0) {
                    const gesture = results.gestures[0][0].categoryName;
                    const palm = results.landmarks[0][0]; // Wrist landmark
                    
                    const now = Date.now();
                    if (now - lastSpawnTime > spawnCooldown && gesture !== "None") {
                        spawnObject(gesture, palm.x, palm.y);
                        lastSpawnTime = now;
                    }
                }
            }

            // Object Animation
            scene.traverse((obj) => {
                if (obj.isMesh) {
                    obj.rotation.x += obj.userData.rotSpeed;
                    obj.rotation.y += obj.userData.rotSpeed;
                }
            });

            renderer.render(scene, camera);
            requestAnimationFrame(renderLoop);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
