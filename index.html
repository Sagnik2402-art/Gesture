<!DOCTYPE html>
<html>
<head>
    <title>3D Hand Spawner</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #video-container { position: relative; width: 100vw; height: 100vh; }
        video { 
            position: absolute; width: 100%; height: 100%; object-fit: cover; 
            transform: scaleX(-1); /* Mirror camera */
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; pointer-events: none;
        }
        .key { color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
        <div id="ui">
            <h3>Hand Gesture Spawner</h3>
            <p><span class="key">Open Palm:</span> Floating Spheres</p>
            <p><span class="key">Closed Fist:</span> Floating Cubes</p>
            <p><span class="key">Victory:</span> Spiky Pyramids</p>
            <p>Shapes will stay where you leave them!</p>
        </div>
    </div>

    <!-- Load Three.js and MediaPipe -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "mediapipe": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GestureRecognizer, FilesetResolver } from "mediapipe";

        // --- 1. Three.js Setup (The 3D World) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('video-container').appendChild(renderer.domElement);

        // Add some light
        const light = new THREE.AmbientLight(0xffwhite, 1);
        scene.add(light);
        const pointLight = new THREE.PointLight(0xffffff, 50);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        camera.position.z = 5;

        // --- 2. MediaPipe Hand Tracking Setup ---
        let gestureRecognizer;
        const video = document.getElementById("webcam");
        let lastVideoTime = -1;
        let lastSpawnTime = 0;
        const spawnCooldown = 600; // Milliseconds between spawns

        async function initAI() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });
            startCamera();
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
            });
        }

        // --- 3. Spawning Logic ---
        function spawnObject(gesture, x, y) {
            // Convert screen coordinates to Three.js world coordinates
            // (x and y are 0 to 1 from MediaPipe)
            const worldX = (x - 0.5) * 10; 
            const worldY = (0.5 - y) * 8; 

            let geometry;
            let material = new THREE.MeshStandardMaterial({ 
                color: Math.random() * 0xffffff,
                metalness: 0.7,
                roughness: 0.2
            });

            if (gesture === "Open_Palm") {
                geometry = new THREE.SphereGeometry(0.3, 32, 32);
            } else if (gesture === "Closed_Fist") {
                geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            } else if (gesture === "Victory") {
                geometry = new THREE.ConeGeometry(0.4, 0.8, 4);
            } else {
                return; // Don't spawn for unknown gestures
            }

            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(-worldX, worldY, 0); // Mirroring X to match mirrored video
            scene.add(mesh);
            
            // Add a little rotation animation data
            mesh.userData.rotationSpeed = Math.random() * 0.02;
        }

        // --- 4. Main Loop ---
        async function predictWebcam() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = gestureRecognizer.recognizeForVideo(video, Date.now());

                if (results.gestures.length > 0) {
                    const gesture = results.gestures[0][0].categoryName;
                    const palm = results.landmarks[0][0]; // Wrist landmark
                    
                    const now = Date.now();
                    if (now - lastSpawnTime > spawnCooldown) {
                        spawnObject(gesture, palm.x, palm.y);
                        lastSpawnTime = now;
                    }
                }
            }

            // Animate all spawned objects
            scene.traverse((obj) => {
                if (obj.isMesh) {
                    obj.rotation.x += obj.userData.rotationSpeed || 0.01;
                    obj.rotation.y += obj.userData.rotationSpeed || 0.01;
                }
            });

            renderer.render(scene, camera);
            requestAnimationFrame(predictWebcam);
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initAI();
    </script>
</body>
</html>
